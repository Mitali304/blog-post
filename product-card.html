<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <style>
        body{
           display: flex;
           justify-content: center; /* Horizontal center */
           align-items: center;     /* Vertical center */
           height: 100vh;           /* Full browser height */
           margin: 0;
}
        .product-card{
            background-color:#F8F5F2;
            border:1px solid;
            border-radius:15px;
            height:550px;
            width:350px;
            display:flex;
            flex-direction:column;
            align-items:center;
            transition:0.3s;


        }
        .product-card:hover{
            transform:scale(1.05);
            box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.3);
        }

        .product-image img{
            height:230px;
            width:300px;
            border:1px solid;
            border-radius:25px;
            margin-top:20px;
            drop-shadow: 0px 8px 15px rgba(0, 0, 0, 0.2);

        }
        .product-details{
            margin-left:23px;


        }
        .product-name{
            font-size:20px;
            font-weight:600;
        }
        .product-price{
            font-size:18px;
            font-weight:500;
            color:red;
        }

        .add-to-cart{
           height:65px;
           width:300px;
             background-color: #ffffff; /* Green */
             color:#4a6faa;;
             font-weight:600;
             border-radius:60px;
                font-size:18px;

        }
        .buy-now{
            margin-top:10px;
            margin-bottom:20px;
             height:65px;
           width:300px;
             background-color: #4a6faa; /* Green */
             color:#ffffff;
             font-weight:600;
             border-radius:60px;
             font-size:18px;

        }
    </style>
</head>
<body>
<section class="product-card">
  <section class="product-image">
  <img src="/p1.jpg" alt="Product Image">
  </section>
    <section class="product-details">
    <p class="product-name">OnePlus Nord Buds</p>
    <p class="product-description">True wireless earbuds with exceptional sound quality and long battery life.</p>
    <p class="product-price">$199.99</p>
    </section>
    <button class="add-to-cart">Add to Cart</button>
    <button class="buy-now">Buy Now</button>

</section>

</body>
</html>
